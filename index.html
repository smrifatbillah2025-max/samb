<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="AvPQkBBJng5WMGRPMEQeSV7_RWWYq_YKsDzc3x4nsL0" />
    <title>Smart Attendance - Authentication</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <style>
        /* Modern Font Stack & Global Reset */
        :root {
            --primary-color: #5E5DF0;
            --secondary-color: #0d1128;
            --background-color: #f0f2f5;
            --form-background: #ffffff;
            --text-color: #333;
            --label-color: #555;
            --border-color: #dde2e7;
            --success-color: #28a745;
            --error-color: #dc3545;
            --white: #fff;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --shadow-hover-color: rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Smooth & Clean Body Style */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            background-image:
                radial-gradient(circle at 1px 1px, #d0d0d0 1px, transparent 0),
                radial-gradient(circle at 15px 15px, #d0d0d0 1px, transparent 0);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Animated & Polished Container */
        .auth-container {
            background: var(--form-background);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Refined Logo */
        .logo {
            margin-bottom: 35px;
        }

        .logo h1 {
            color: var(--secondary-color);
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .logo p {
            color: var(--label-color);
            font-size: 16px;
        }

        /* Enhanced Form Group Styling */
        .form-group {
            margin-bottom: 25px;
            position: relative;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--label-color);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: var(--background-color);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(94, 93, 240, 0.2);
        }

        .form-group input:valid:not(:placeholder-shown) {
            border-color: var(--success-color);
        }

        .form-group input:invalid:not(:placeholder-shown) {
            border-color: var(--error-color);
        }

        /* Modern & Interactive Buttons */
        .submit-btn,
        .google-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            border: none;
        }

        .submit-btn {
            background-image: linear-gradient(135deg, var(--primary-color) 0%, #a3a1f7 100%);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(94, 93, 240, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(94, 93, 240, 0.3);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Spinner & Loading State */
        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Styled Message Boxes */
        .message,
        .redirect-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 15px;
            text-align: center;
            font-weight: 500;
            display: none;
            border: 1px solid transparent;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }

        .redirect-message {
            background-color: #d1ecf1;
            color: #0c5460;
            border-color: #bee5eb;
        }

        /* Clean Divider */
        .or-divider {
            margin: 30px 0;
            text-align: center;
            position: relative;
            color: var(--label-color);
        }

        .or-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
            z-index: 1;
        }

        .or-divider span {
            background: var(--form-background);
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        /* Enhanced Google Button */
        .google-btn {
            background: var(--white);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-color);
            margin-bottom: 0;
        }

        .google-btn:hover {
            border-color: #c0c0c0;
            box-shadow: 0 4px 12px var(--shadow-color);
            transform: translateY(-2px);
        }

        .google-btn:active {
            transform: translateY(-1px);
        }

        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Auth Toggle Link */
        .auth-toggle {
            text-align: center;
            margin-top: 30px;
        }

        .auth-toggle p {
            color: var(--label-color);
            font-size: 15px;
            margin: 0;
            display: inline;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            padding: 0;
            margin-left: 5px;
        }

        .toggle-btn:hover {
            text-decoration: underline;
        }

        /* Hide/Show animation for form groups */
        .form-group.hidden {
            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);
            overflow: hidden;
            margin-bottom: 0;
            transition: all 0.5s ease-out;
        }

        .form-group {
            max-height: 200px;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Sign-in Mode Specifics */
        .signin-mode .logo h1::after {
            content: ' - Sign In';
        }

        .signin-mode .logo p::before {
            content: 'Welcome back! Please sign in to continue.';
            color: var(--label-color);
            font-size: 16px;
        }

        .signin-mode .logo p {
            content: '';
            display: block;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="logo">
            <img src="logo.png" alt="Logo" class="auth-logo" style="width: 80px; margin-bottom: 10px;">
            <h1>Smart Attendance</h1>
            <p>Create your account</p>
        </div>

        <form id="authForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <div class="form-group">
                <label for="school">School/Institution</label>
                <input type="text" id="school" name="school" required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span id="btnText">Create Account</span>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </button>

            <div class="message" id="message"></div>
            <div class="redirect-message" id="redirectMessage">
                Authentication successful! Redirecting to app...
            </div>
        </form>

        <div class="or-divider">
            <span>or</span>
        </div>

        <button type="button" class="google-btn" id="googleSignIn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Continue with Google
        </button>

        <div class="auth-toggle">
            <p id="toggleText">Already have an account?</p>
            <button type="button" class="toggle-btn" id="toggleMode">Sign In</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            updateProfile,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBRAQwYpcEVyQAVFjGF-WuNmGg8-K5pMHE",
            authDomain: "gen-lang-client-0706325479.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0706325479-default-rtdb.firebaseio.com",
            projectId: "gen-lang-client-0706325479",
            storageBucket: "gen-lang-client-0706325479.firebasestorage.app",
            messagingSenderId: "336160005275",
            appId: "1:336160005275:web:6f4aa0912b165c91d6fa3e",
            measurementId: "G-01Z6XHSGP0"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // Get DOM elements
        const form = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loading = document.getElementById('loading');
        const messageDiv = document.getElementById('message');
        const redirectMessage = document.getElementById('redirectMessage');
        const googleSignInBtn = document.getElementById('googleSignIn');
        const toggleModeBtn = document.getElementById('toggleMode');
        const toggleText = document.getElementById('toggleText');
        const logoTitle = document.querySelector('.logo h1');
        const logoSubtitle = document.querySelector('.logo p');
        const usernameGroup = document.getElementById('username').parentElement;
        const schoolGroup = document.getElementById('school').parentElement;

        let isSignInMode = false;

        // Check authentication state on page load
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('User is already authenticated:', user.email);
                // User is signed in, redirect to app
                setTimeout(() => {
                    window.location.href = 'app.html';
                }, 1000);
            }
        });

        // Toggle between Sign Up and Sign In
        function toggleAuthMode() {
            isSignInMode = !isSignInMode;

            if (isSignInMode) {
                // Switch to Sign In mode
                logoTitle.textContent = 'Smart Attendance - Sign In';
                logoSubtitle.textContent = 'Welcome back';
                btnText.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleModeBtn.textContent = 'Sign Up';
                usernameGroup.classList.add('hidden');
                schoolGroup.classList.add('hidden');
                document.body.classList.add('signin-mode');
            } else {
                // Switch to Sign Up mode
                logoTitle.textContent = 'Smart Attendance';
                logoSubtitle.textContent = 'Create your account';
                btnText.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account?';
                toggleModeBtn.textContent = 'Sign In';
                usernameGroup.classList.remove('hidden');
                schoolGroup.classList.remove('hidden');
                document.body.classList.remove('signin-mode');
            }

            // Clear form and messages
            form.reset();
            messageDiv.style.display = 'none';
            redirectMessage.style.display = 'none';
        }

        // Show message function
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            // Hide after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Show loading state
        function showLoading(show, isGoogle = false) {
            const targetBtn = isGoogle ? googleSignInBtn : submitBtn;
            const targetText = isGoogle ? googleSignInBtn.querySelector('span') || googleSignInBtn : btnText;
            const targetLoading = isGoogle ? null : loading;

            if (show) {
                targetBtn.disabled = true;
                if (isGoogle) {
                    googleSignInBtn.innerHTML = '<div class="spinner"></div> Signing in...';
                } else {
                    targetText.style.opacity = '0';
                    targetLoading.style.display = 'block';
                }
            } else {
                targetBtn.disabled = false;
                if (isGoogle) {
                    googleSignInBtn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continue with Google
                    `;
                } else {
                    targetText.style.opacity = '1';
                    targetLoading.style.display = 'none';
                }
            }
        }

        // Redirect to app.html after success
        function redirectToApp() {
            redirectMessage.style.display = 'block';

            // Show countdown
            let countdown = 3;
            const countdownText = redirectMessage.textContent;

            const interval = setInterval(() => {
                redirectMessage.textContent = `${countdownText} (${countdown}s)`;
                countdown--;

                if (countdown < 0) {
                    clearInterval(interval);
                    // Redirect to app.html
                    window.location.href = 'app.html';
                }
            }, 1000);
        }

        // Save user data to Firestore
        async function saveUserData(user, additionalData = {}) {
            try {
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userDocRef);

                const userData = {
                    email: user.email,
                    lastLogin: new Date().toISOString(),
                    ...additionalData
                };

                if (!userDoc.exists()) {
                    // New user - save all data
                    userData.createdAt = new Date().toISOString();
                    await setDoc(userDocRef, userData);
                } else {
                    // Existing user - update last login
                    await setDoc(userDocRef, { lastLogin: userData.lastLogin }, { merge: true });
                }

                console.log('User data saved to Firestore');
            } catch (error) {
                console.error('Error saving user data:', error);
                // Don't show error to user for this non-critical operation
            }
        }

        // Google Sign In
        googleSignInBtn.addEventListener('click', async () => {
            showLoading(true, true);

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Save user data
                await saveUserData(user, {
                    username: user.displayName || user.email.split('@')[0],
                    school: 'Not specified'
                });

                showLoading(false, true);
                showMessage('Successfully signed in with Google!', 'success');

                setTimeout(() => {
                    redirectToApp();
                }, 1500);

            } catch (error) {
                showLoading(false, true);
                console.error('Google sign in error:', error);

                let errorMessage = 'Google sign in failed. Please try again.';

                switch (error.code) {
                    case 'auth/popup-closed-by-user':
                        errorMessage = 'Sign in was cancelled.';
                        break;
                    case 'auth/popup-blocked':
                        errorMessage = 'Popup was blocked. Please allow popups and try again.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Network error. Please check your internet connection.';
                        break;
                    case 'auth/account-exists-with-different-credential':
                        errorMessage = 'An account already exists with this email address.';
                        break;
                }

                showMessage(errorMessage, 'error');
            }
        });

        // Form submit handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Validation
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            if (!isSignInMode) {
                // Additional validation for Sign Up
                const username = document.getElementById('username').value.trim();
                const school = document.getElementById('school').value.trim();

                if (!username || !school) {
                    showMessage('Please fill in all fields', 'error');
                    return;
                }

                if (password.length < 6) {
                    showMessage('Password must be at least 6 characters long', 'error');
                    return;
                }
            }

            showLoading(true);

            try {
                let user;

                if (isSignInMode) {
                    // Sign In
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    user = userCredential.user;

                    // Update last login
                    await saveUserData(user);

                    showMessage('Successfully signed in!', 'success');
                } else {
                    // Sign Up
                    const username = document.getElementById('username').value.trim();
                    const school = document.getElementById('school').value.trim();

                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    user = userCredential.user;

                    // Update user profile
                    await updateProfile(user, {
                        displayName: username
                    });

                    // Save user data to Firestore
                    await saveUserData(user, {
                        username: username,
                        school: school
                    });

                    showMessage('Account created successfully!', 'success');
                }

                // Hide loading and clear form
                showLoading(false);
                form.reset();

                // Redirect to app.html after 1.5 seconds
                setTimeout(() => {
                    redirectToApp();
                }, 1500);

            } catch (error) {
                showLoading(false);
                console.error('Auth error:', error);

                let errorMessage = 'An error occurred. Please try again.';

                // Handle specific Firebase errors
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'This email is already registered. Try signing in instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password is too weak. Use at least 6 characters.';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email. Please sign up first.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-credential':
                        errorMessage = 'Invalid email or password. Please check and try again.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Network error. Please check your internet connection.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many attempts. Please try again later.';
                        break;
                }

                showMessage(errorMessage, 'error');
            }
        });

        // Toggle mode event listener
        toggleModeBtn.addEventListener('click', toggleAuthMode);

        // Real-time form validation
        document.getElementById('email').addEventListener('input', function () {
            const email = this.value;
            if (email && !email.includes('@')) {
                this.style.borderColor = '#dc3545';
            } else {
                this.style.borderColor = '#e1e5e9';
            }
        });

        document.getElementById('password').addEventListener('input', function () {
            const password = this.value;
            if (password.length > 0 && password.length < 6 && !isSignInMode) {
                this.style.borderColor = '#dc3545';
            } else {
                this.style.borderColor = '#e1e5e9';
            }
        });
    </script>
</body>

</html>
